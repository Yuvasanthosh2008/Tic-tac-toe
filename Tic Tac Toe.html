<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title> TIC TAC TOE GAME </title>
    <style>
        body{
            background-color: #548687;
            text-align: center;
            height:100vh;
        }
        .container{
            height:80vh;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
        }
        .game{
            height:70vh;
            width: 73vh;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap:1.5vmin;
        }
        .box{
            height:23vh;
            width: 23vh;
            border-radius: 1rem;
            border:none;
            box-shadow:rgba(0,0,0,0.3);
            font-size: 50px;
            color: rgba(255, 0, 4, 0.947);
            background-color: hsl(61, 100%, 88%);
        }
        #reset-btn{
            padding: 0.5rem;
            font-size: 1.4rem;
            background-color: black;
            color:aliceblue;
            border-radius: 1rem;
            border: none;

        }
        #new{
            padding: 0.6rem;
            font-size: 1.5rem;
            background-color: black;
            color:aliceblue;
            border-radius: 1rem;
            border: none;
            display: block;
            margin-left:550px;
            margin-top:5px;
           
        }
        #msgcont{
            height:40px;
        }
        #wi{
            font-size: 45px;
            font-family: 'Times New Roman', Times, serif;
            font-weight: bolder;
            color:hsl(61, 100%, 88%);
        }
    </style>
</head>
<body>
    <div id="msgcont">
        <h1 id="wi">Winner</h1>
    </div>
    <h1>Tic Tac Toe</h1>
    <div class="container">
        <div class="game">
            <button class="box"></button>
            <button class="box"></button>
            <button class="box"></button>
            <button class="box"></button>
            <button class="box"></button>
            <button class="box"></button>
            <button class="box"></button>
            <button class="box"></button>
            <button class="box"></button>
        </div>
    </div>
    <button id="reset-btn">Reset Game</button>
    <button id="new">New Game</button>
    <script>
        let boxes=document.querySelectorAll(".box");
        let resetbtn=document.querySelector("#reset-btn");
        let newgame=document.querySelector("#new");
        let msgcont=document.querySelector("#msgcont");
        let winner=document.querySelector("#wi");
        let turno=true;
        const win=[
            [0,1,2],
            [0,3,6],
            [0,4,8],
            [1,4,7],
            [2,5,8],
            [2,4,6],
            [3,4,5],
            [6,7,8]
        ];
        let count=0;
        boxes.forEach((box)=>{
            box.addEventListener("click",()=>{
                console.log("box was clicked");
                if(turno){
                    box.innerText="O";
                    count++;
                    turno=false;
                }else{
                    box.innerText="X";
                    count++;
                    turno=true;
                }
                box.disabled=true;
                checkWinner();

            });
        });
        const resetgame=()=>{
            turno=true;
            count=0;
            enablebox();
            winner.innerText="";
            msgcont.classList.add("hide");
        }
        const disbox=()=>{
            for(let box of boxes){
                box.disabled=true;
            }
        }
        const enablebox=()=>{
            for(let box of boxes){
                box.disabled=false;
                box.innerText="";
            }
        }
        const showwinner=(won)=>{
            winner.innerText = "Congratulations, Winner is " + won;
            disbox();
        }
        const checkWinner=()=>{
            for(let pattern of win){
                let pos1val=boxes[pattern[0]].innerText;
                let pos2val=boxes[pattern[1]].innerText;
                let pos3val=boxes[pattern[2]].innerText;
                if(pos1val!="" && pos2val!="" && pos3val!=""){
                    if(pos1val==pos2val && pos2val==pos3val){
                        console.log("winner",pos1val);
                        showwinner(pos1val);
                        return;
                    }
                }
            }
            if(count==9){
                winner.innerText="The Match is Draw";
                disbox();
            }
        }
        newgame.addEventListener("click",resetgame);
        resetbtn.addEventListener("click",resetgame);

    </script>

</body>
</html>
